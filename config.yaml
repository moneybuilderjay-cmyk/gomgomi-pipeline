# 요일별 콘텐츠 편성 (v2) — 0=월 ... 6=일
weekday_categories:
  0: {name: "이번 주 미국증시 캘린더", pillar: "us_calendar",
      guide: "이번 주 주요 실적 발표·경제지표 일정과 주목할 섹터를 정리. 시장 데이터가 있으면 활용. '이번 주 뭘 봐야 하나'에 답하는 실전 정보"}
  1: {name: "곰곰 용어사전", pillar: "term",
      guide: "경제/증시 용어 1개를 깊고 쉽게. 실생활 예시와 '이 용어가 내 돈과 무슨 상관인지' 연결. 저장 유도형"}
  2: {name: "국내 이슈 해설", pillar: "kr_issue",
      guide: "이번 주 국내 경제/증시 이슈 중 하나를 사회초년생 눈높이로 해설. 헤드라인 참고. 도달용 시사 콘텐츠"}
  3: {name: "미국주식 돋보기", pillar: "us_stock",
      guide: "미국 종목/ETF/섹터 하나를 분석. 사업모델·실적·리스크를 쉽게. 종목 추천이 아닌 분석임을 명시. 정보 접근성 낮은 미국주식 정보로 차별화"}
  4: {name: "월급 재테크 실전", pillar: "guide",
      guide: "계좌/절세/포트폴리오/월급관리 실전 가이드. 오늘 바로 따라할 수 있는 단계형"}
  5: {name: "주간 결산", pillar: "weekly_wrap",
      guide: "이번 주 시장 리뷰(코스피/S&P/환율 등 핵심 변화)와 다음 주 관전 포인트. 헤드라인 적극 활용"}
  6: {name: "곰곰이의 투자 원칙", pillar: "mindset",
      guide: "장기투자 마인드셋/투자 원칙/행동경제학 교훈. 가볍고 공감가는 톤. 커뮤니티 반응 유도"}

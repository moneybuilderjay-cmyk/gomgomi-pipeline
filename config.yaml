# 요일별 콘텐츠 편성 (v3, 미국 중심) — 0=월 ... 6=일
# 원칙: 미국 경제·증시 비중 우선. 국내는 주 1회 + 주간결산에서 보조로만.
weekday_categories:
  0: {name: "이번 주 미국증시 투자 포인트", pillar: "us_calendar",
      guide: "이번 주(날짜 명시) 미국 실적 발표·경제지표 일정과 관전 포인트. '이번 주 투자자들이 꼭 알아야 하는 포인트 N가지' 형식. 시장 데이터·실적 캘린더 적극 활용. 실시간성이 생명 — 오늘 날짜 기준으로 작성"}
  1: {name: "월가가 주목한 종목", pillar: "us_movers",
      guide: "어제~오늘 미국시장 급등/급락/거래상위 종목 중 하나를 골라 '왜 움직였나'를 해설. [오늘 시장이 주목한 종목]·커뮤니티 신호에서 소재 선택. '~한 이유', '~의 정체' 형식의 궁금증 유발 제목. 추천 아닌 분석임을 명시"}
  2: {name: "국내 증시 이슈 해설", pillar: "kr_issue",
      guide: "이번 주 국내 경제/증시 이슈 하나를 해설하되, 미국과의 연결고리(환율·미국 정책·반도체 사이클 등)를 반드시 포함. 사회초년생 눈높이"}
  3: {name: "미국주식 돋보기", pillar: "us_stock",
      guide: "미국 종목/ETF/섹터 하나를 심층 분석. 사업모델·실적·리스크를 쉽게. 지금 화제인 종목 우선(커뮤니티·무버 신호 참고). 종목 추천이 아닌 분석임을 명시"}
  4: {name: "월급 재테크 실전", pillar: "guide",
      guide: "계좌/절세/포트폴리오/월급관리 실전 가이드. 미국 ETF·달러 투자 실전을 우선 소재로. 오늘 바로 따라할 수 있는 단계형"}
  5: {name: "주간 결산 & 다음 주 포인트", pillar: "weekly_wrap",
      guide: "이번 주 미국시장 리뷰(S&P·나스닥·환율·핵심 이벤트) 중심 + 코스피는 한 카드로 요약. 다음 주 날짜 범위를 명시한 관전 포인트 마무리. 헤드라인·시장 데이터 적극 활용"}
  6: {name: "곰곰이의 투자 원칙", pillar: "mindset",
      guide: "장기투자 마인드셋/투자 원칙/행동경제학 교훈. 가볍고 공감가는 톤. 커뮤니티 반응 유도"}

name: publish
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install requests pyyaml
      - name: Process approvals + publish
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_BRANCH: main
        run: python src/main_publish.py
      - name: Commit published images + state
        run: |
          git config user.name "gomgomi-bot"
          git config user.email "bot@users.noreply.github.com"
          mkdir -p data published
          git add -A data published || true
          git diff --cached --quiet || (git commit -m "publish: $(date +%F)" && git push)

name: pipeline
on:
  schedule:
    - cron: "0 21 * * *"    # 06:00 KST — 후보 제안
    - cron: "0 23,1,3,5,7,9,11 * * *"  # 2시간 간격 — 상태 전진(선택→생성→승인→게시)
  workflow_dispatch:
permissions:
  contents: write
jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps chromium
      - name: Advance pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          QUANT_FEED_URL: ${{ secrets.QUANT_FEED_URL }}
          QUANT_API_KEY: ${{ secrets.QUANT_API_KEY }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_BRANCH: main
        run: python src/main_pipeline.py
      - name: Commit state
        run: |
          git config user.name "gomgomi-bot"
          git config user.email "bot@users.noreply.github.com"
          mkdir -p data out published
          git add -A data out published backlog.yaml || true
          git diff --cached --quiet || (git commit -m "pipeline: $(date -u +%FT%H:%M)" && git push)

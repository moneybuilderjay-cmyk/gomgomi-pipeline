name: fetch-cards
on: workflow_dispatch
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install requests
      - name: Fetch generated cards
        run: python src/fetch_cards.py
      - name: Commit
        run: |
          git config user.name "gomgomi-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A data out
          git diff --cached --quiet || (git commit -m "cards: fetch higgsfield renders $(date -u +%FT%H:%M)" && git push)

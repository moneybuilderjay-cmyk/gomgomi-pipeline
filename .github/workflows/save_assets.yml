name: save-assets
on: workflow_dispatch
permissions:
  contents: write
jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download character assets
        run: |
          mkdir -p assets/character_v3 assets/account_v3
          curl -fsSL -o assets/character_v3/gomgom_hero.png "https://d8j0ntlcm91z4.cloudfront.net/user_3ESCtv4ATktvRwu8eteXNyVj4ch/hf_20260711_142453_0c3db15e-3657-4119-861a-c6f6da3cd5ca.png"
          curl -fsSL -o assets/character_v3/gomgom_poses.png "https://d8j0ntlcm91z4.cloudfront.net/user_3ESCtv4ATktvRwu8eteXNyVj4ch/hf_20260711_142956_ccf74a71-770b-4f19-85b1-1a14517dea7f.png"
          curl -fsSL -o assets/account_v3/profile_gomgom.png "https://d8j0ntlcm91z4.cloudfront.net/user_3ESCtv4ATktvRwu8eteXNyVj4ch/hf_20260712_040436_086cfb97-5323-444d-9507-73aec683f583.png"
          curl -fsSL -o assets/account_v3/highlight_intro.png "https://d8j0ntlcm91z4.cloudfront.net/user_3ESCtv4ATktvRwu8eteXNyVj4ch/hf_20260712_040457_d68191fa-da36-43f6-bd30-77c8b23a6645.png"
          curl -fsSL -o assets/account_v3/highlight_freebie.png "https://d8j0ntlcm91z4.cloudfront.net/user_3ESCtv4ATktvRwu8eteXNyVj4ch/hf_20260712_040459_2a31ac34-fa82-4ad6-ae02-e31120a2be4b.png"
          curl -fsSL -o assets/account_v3/highlight_stocks.png "https://d8j0ntlcm91z4.cloudfront.net/user_3ESCtv4ATktvRwu8eteXNyVj4ch/hf_20260712_040500_b8b19658-c0b3-4e56-905a-4ac85fa30d2a.png"
          curl -fsSL -o assets/account_v3/highlight_review.png "https://d8j0ntlcm91z4.cloudfront.net/user_3ESCtv4ATktvRwu8eteXNyVj4ch/hf_20260712_040502_dd54035e-0c05-4d4c-93a8-a9bdf9c7c14f.png"
          ls -la assets/character_v3 assets/account_v3
      - name: Commit
        run: |
          git config user.name "gomgomi-bot"
          git config user.email "bot@users.noreply.github.com"
          git add assets
          git diff --cached --quiet || (git commit -m "assets: v3 account set (profile + highlight covers)" && git push)
